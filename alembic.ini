# ==============================================================================
# Alembic configuration — AI Productivity Agent v3.0
# IMPORTANT: sqlalchemy.url uses the synchronous sqlite:// driver.
# The async sqlite+aiosqlite:// driver is ONLY used at runtime, not for migrations.
# ==============================================================================

[alembic]
script_location = migrations
sqlalchemy.url = sqlite:///./agent_memory.db

# File naming template for auto-generated revision files
file_template = %%(rev)s_%%(slug)s

# Truncate slug length for readability
truncate_slug_length = 60

# Timezone for "Create Date" in revision files
timezone = UTC

[post_write_hooks]
# No post-write hooks configured

# ==============================================================================
# Logging
# ==============================================================================

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
